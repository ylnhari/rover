name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          go build \
            -ldflags="-s -w -X github.com/ylnhari/rover/internal/version.Build=${VERSION}" \
            -o "${BINARY}" .

      - name: Checksum
        run: |
          BINARY=rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
          generate_release_notes: true
