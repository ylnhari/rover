name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -v -race -count=1 -timeout 60s

  build:
    name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: rover-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rover-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
